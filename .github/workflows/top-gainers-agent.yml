name: Top Gainers Agent

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 22:30 CET (21:30 UTC) måndag-fredag
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run top gainers agent
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: node scripts/top-gainers-agent.js
