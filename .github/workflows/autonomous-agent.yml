name: Autonomous Agent

on:
  push:
    branches:
      - main

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run autonomous agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/autonomous-agent.js

      - name: Commit report
        run: |
          git config user.name "styr-ai[bot]"
          git config user.email "styr-ai@users.noreply.github.com"
          git add state/autonomous_report.md state/global_status.md
          git diff --cached --quiet || git commit -m "autonomous agent run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
