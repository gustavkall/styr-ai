name: COO Agent

on:
  workflow_dispatch:  # Manuell trigger — pausad från schema
  # schedule:
  #   - cron: '0 6 * * 1-5'  # 06:00 CET — avkommenteras när redo

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run COO agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: node scripts/coo-agent.js
